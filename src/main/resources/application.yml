server:
  port: 9123
  servlet:
    context-path: /api
#    cookie 过期时间设置30天后过期
    session:
      cookie:
        max-age: 2592000
spring:
  application:
    name: h-smartpic-backend
  profiles:
#    active: local
    active: prod
  #  数据库 配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/h_smartpic
    username: root
    password: 1234
  #  Redis 配置
  redis:
    host: localhost
    port: 6379
    password: 123456
    database: 0
    timeout: 60s
  #  session 配置
  session:
    store-type: redis
    #    redis 过期时间设置30天后过期
    timeout: 2592000
# 开放上传文件最大大小
  servlet:
    multipart:
      max-file-size: 10MB
  # 空间图片分表
  shardingsphere:
    datasource:
      names: h_smartpic
      h_smartpic:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://localhost:3306/h_smartpic
        username: root
        password: 1234
    rules:
      sharding:
        tables:
          picture:
            actual-data-nodes: h_smartpic.picture # 动态分表
            table-strategy:
              standard:
                sharding-column: spaceId
                sharding-algorithm-name: picture_sharding_algorithm  # 使用自定义分片算法
        sharding-algorithms:
          picture_sharding_algorithm:
            type: CLASS_BASED
            props:
              strategy: standard
              algorithmClassName: com.hsc.hsmartpicbackend.manager.sharding.PictureShardingAlgorithm
    props:
      sql-show: true
mybatis-plus:
  configuration:
    # MyBatis 配置
    map-underscore-to-camel-case: false
    # 仅在开发环境打印日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    enable-sql-runner: true
    db-config:
      logic-delete-field: isDelete # 全局逻辑删除的实体字段名
      logic-delete-value: 1 # 逻辑已删除值（默认为 1）
      logic-not-delete-value: 0 # 逻辑未删除值（默认为 0）
# 接口文档配置
knife4j:
  enable: true
  openapi:
    title: 接口文档
    version: 1.0
    group:
      default:
        api-rule: package
        api-rule-resources:
          - com.hsc.hsmartpicbackend.controller
